name: Auto PR

on:
  push:
    branches-ignore:
      - main
      - master

permissions:
  contents: read
  pull-requests: write

jobs:
  open-pull-request:
    runs-on: ubuntu-latest
    steps:
      - name: Create pull request if missing
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.ref.replace('refs/heads/', '');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const base = 'main';

            const { data: existing } = await github.rest.pulls.list({
              owner,
              repo,
              head: `${owner}:${branch}`,
              base,
              state: 'open',
            });

            if (existing.length > 0) {
              core.info(`Open PR already exists for ${branch} → #${existing[0].number}`);
              return;
            }

            const { data: pr } = await github.rest.pulls.create({
              owner,
              repo,
              title: branch,
              head: branch,
              base,
              body: [
                'Auto-opened when this branch was pushed.',
                '',
                `- **Branch:** \`${branch}\``,
                `- **Commit:** ${context.sha}`,
              ].join('\n'),
            });

            core.info(`Created PR #${pr.number}: ${branch} → ${base}`);
